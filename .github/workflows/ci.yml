name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          # Fail loud if any tests/fixtures/ file is missing — silent skips
          # would let a broken checkout pass CI unnoticed.
          PROTEOMICS_REQUIRE_FIXTURES: "1"
        # Only skip tests that reference the developer's local data/ folder
        # (not committed to the repo). Everything else — including real-data
        # integration tests using tests/fixtures/ — runs.
        run: pytest -v -m "not local_only"
